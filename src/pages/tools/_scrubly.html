<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrubly</title>
<style>
  :root{--bg:#ffffff;--panel:#f4f4f6;--line:#d6d6dd;--text:#16161a;--muted:#6b6b76;--accent:#2f6df6;--addborder:#b8b8c0;--hoverborder:#a9a9b3;}
  @media (prefers-color-scheme: dark){
    :root{--bg:#16161a;--panel:#222228;--line:#3a3a44;--text:#ececef;--muted:#a0a0ac;--accent:#4f86ff;--addborder:#4a4a55;--hoverborder:#5a5a66;}
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 0;height:100dvh;display:flex;flex-direction:column;}
  .topfixed{flex:0 0 auto;}
  .optscroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding-bottom:64px;}
  .headrow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  h1{font-size:22px;font-weight:650;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 24px;}
  .homepill{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--text);text-decoration:none;background:transparent;transition:border-color .15s,background .15s;}
  .homepill svg{width:16px;height:16px;}
  @media (hover: hover) and (pointer: fine){ .homepill:hover{border-color:var(--hoverborder);background:var(--panel);} }
  .stage{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:16px;overflow:hidden;border:1px solid var(--line);}
  .stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;will-change:opacity,filter,transform;}
  #stageCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #imgB{z-index:1;} #imgA{z-index:2;}
  .dlpill{position:absolute;bottom:9px;right:9px;z-index:5;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.62);color:#fff;border:none;border-radius:999px;height:28px;width:104px;padding:0 8px;font-size:11px;font-weight:600;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);font-variant-numeric:tabular-nums;font-feature-settings:"tnum";overflow:hidden;white-space:nowrap;transition:background .15s;}
  .dlpill[disabled]{cursor:default;}
  .dlpill .lbl{display:inline-block;transition:opacity .16s ease;}
  .dlpill .lbl.fading{opacity:0;}

  /* thumbnail strip */
  .striprow{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:14px;}
  .strip{display:flex;gap:10px;align-items:center;flex:1 1 auto;flex-wrap:wrap;min-width:0;}
  .strip-ctrl{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .pr-row{display:flex;align-items:center;gap:8px;}
  .striphint{font-size:12px;color:var(--muted);}
  @media (min-width:641px){
    .striphint{flex:0 0 100%;}        /* own full-width line below the strip */
  }
  @media (max-width:640px){
    .striprow{flex-direction:column;align-items:stretch;gap:12px;}
    .striphint{order:1;}              /* hint above the controls on mobile */
    .strip-ctrl{order:2;align-self:flex-end;align-items:flex-end;}
  }
  .thumb{position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:#222;flex:0 0 auto;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .idx{position:absolute;top:2px;left:4px;font-size:10px;color:#fff;text-shadow:0 1px 2px #000;font-weight:700;}
  .thumb .del{position:absolute;top:2px;right:2px;width:16px;height:16px;line-height:14px;text-align:center;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:11px;display:block;}
  .thumb.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(47,109,246,.4);}
  .addbtn{width:64px;height:64px;border-radius:10px;border:1px dashed var(--addborder);background:transparent;color:var(--muted);font-size:26px;cursor:pointer;flex:0 0 auto;}

  .timeline{margin-top:16px;}
  .seekrow{display:flex;align-items:center;gap:16px;}
  .seekcol{flex:1 1 auto;min-width:0;}
  .seek{width:100%;accent-color:var(--accent);}
  .dur-field{flex:0 0 auto;display:flex;flex-direction:column;gap:0;min-width:180px;}
  .dur-field input[type=range]{width:100%;accent-color:var(--accent);}
  .dur-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  .tmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;font-feature-settings:"tnum";padding: 0px 2px;}

  .play{background:var(--accent);color:#fff;border:none;border-radius:10px;height:40px;flex:0 0 118px;width:118px;min-width:118px;white-space:nowrap;padding:0 16px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .play:active{transform:translateY(1px);}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:8px;height:40px;padding:0 14px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .ghost .ic{font-size:18px;line-height:1;}
  .field{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  label.lp{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;}

  .controls{margin-top:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  button.variant{width:100%;min-width:0;height:60px;display:flex;align-items:center;justify-content:center;text-align:center;background:transparent;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;font-weight:650;line-height:1.25;cursor:pointer;transition:border-color .15s,background .15s,color .15s;}
  button.variant.active{border-color:var(--accent);background:var(--accent);color:#fff;}

  /* Hover effects only on real pointer devices (mouse) — not on touch,
     where :hover sticks after a tap and looks like the button stayed pressed. */
  @media (hover: hover) and (pointer: fine){
    .dlpill:hover{background:rgba(0,0,0,.78);}
    .addbtn:hover{border-color:var(--accent);color:var(--accent);}
    button.variant:hover{border-color:var(--hoverborder);}
    .thumb .del{display:none;}
    .thumb:hover .del{display:block;}
  }
  .vardesc-row{margin-top:24px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
  .vardesc{font-size:13px;line-height:1.5;color:var(--muted);min-height:40px;}
  .vardesc b{color:var(--text);}
  .copypill{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;background:var(--text);color:var(--bg);border:none;border-radius:999px;height:30px;width:118px;padding:0 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;transition:background .15s,opacity .15s;}
  .copypill .lbl{display:inline-block;transition:opacity .16s ease;}
  .copypill .lbl.fading{opacity:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topfixed">
  <div class="headrow">
    <h1>Scrubly</h1>
    <a class="homepill" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      Home
    </a>
  </div>
  <p class="sub">Scrub to feel the transition frame-by-frame, or press Play. Stops on the final frame.</p>

  <div class="stage">
    <canvas id="stageCanvas"></canvas>
    <img id="imgB" alt="" style="display:none">
    <img id="imgA" alt="" style="display:none">
    <button type="button" class="dlpill" id="dlBtn"><span class="lbl" id="dlLbl">Download</span></button>
  </div>

  <div class="striprow">
    <div class="strip" id="strip"></div>
    <div class="strip-ctrl">
      <div class="pr-row">
        <label class="lp"><input type="checkbox" id="loop"> Loop</label>
        <button type="button" class="play" id="play">▶ Play</button>
        <button type="button" class="ghost" id="reset"><span class="ic">↺</span> Reset</button>
      </div>
    </div>
    <div class="striphint">Click a thumbnail to replace it · the active one (outlined) is being previewed · + adds another step</div>
  </div>

  <div class="timeline">
    <div class="seekrow">
      <div class="dur-field">
        <input type="range" id="dur" min="600" max="3000" step="100" value="1600">
        <div class="dur-meta"><span>Duration / step</span><span id="durVal">1.6s</span></div>
      </div>
      <div class="seekcol">
        <input type="range" class="seek" id="seek" min="0" max="1000" step="1" value="0">
        <div class="tmeta"><span id="fromLbl">Step 1</span><span id="pct">0%</span><span id="toLbl">Step 2</span></div>
      </div>
    </div>
  </div>
  </div>

  <div class="optscroll">
  <div class="controls" id="variants"></div>
  <div class="vardesc-row">
    <div class="vardesc" id="vardesc"></div>
    <button type="button" class="copypill" id="copyBtn"><span class="lbl" id="copyLbl">Copy prompt</span></button>
  </div>
  </div>
</div>

<input type="file" id="filePicker" accept="image/*" style="display:none">

/* ---------- Haptics (ios-haptics technique + android fallback) ----------
   iOS Safari 17.4–26.4: toggling a hidden <input type=checkbox switch> fires a
   light haptic. (Apple patched the programmatic path in 26.5, so it may be a
   no-op on newest iOS — harmless.) Android: navigator.vibrate. */
let _hapticSwitch=null;
function haptic(){
  // Android / browsers that support the Vibration API
  if(navigator.vibrate){ try{ navigator.vibrate(8); }catch(e){} }
  // iOS Safari switch-toggle trick
  try{
    if(!_hapticSwitch){
      _hapticSwitch=document.createElement('input');
      _hapticSwitch.type='checkbox';
      _hapticSwitch.setAttribute('switch','');
      _hapticSwitch.style.cssText='position:absolute;opacity:0;pointer-events:none;width:0;height:0;';
      document.body.appendChild(_hapticSwitch);
    }
    _hapticSwitch.checked=!_hapticSwitch.checked;
    _hapticSwitch.dispatchEvent(new Event('change'));
  }catch(e){}
}

let playing=false;
let pickerTarget=null; // index to replace, or 'add'

const ease=t=>t<.5?2*t*t:1-(-2*t+2) ** 2/2;   // ease-in-out (default)
const easeIn=t=>t*t;                                  // ease-in
const easeOut=t=>1-(1-t)*(1-t);                       // ease-out

// The first image defines a "content frame": its aspect ratio is fitted into
// the stage (letterboxed with black bars), and every image — including later
// ones with different aspect ratios — is cover-cropped into that same frame,
// so transitions move in a single dimension instead of jumping shape.
function contentRect(img,W,H){
  if(!img?.naturalWidth||!img.naturalHeight) return {x:0,y:0,w:W,h:H};
  const ar=img.naturalWidth/img.naturalHeight;
  let w=W;
  let h=W/ar;
  if(h>H){ h=H; w=H*ar; }
  return {x:(W-w)/2, y:(H-h)/2, w, h};
}

// ---- Unified canvas drawing helpers ----
// drawImg: draw image with object-fit:cover into (ctx) of WxH, with options.
//   {alpha, blur, scale, tx, ty (fractions of W/H), clip:[l,r] (frac of W), pixel (px block size)}
function drawImg(ctx,img,W,H,o={}){
  ctx.save();
  if(o.clip){
    const l=o.clip[0]*W;
    const r=o.clip[1]*W;
    if(r-l<=0){ ctx.restore(); return; }
    ctx.beginPath(); ctx.rect(l,0,r-l,H); ctx.clip();
  }
  if(o.circle){ // {cx,cy,r} reveal disc (fractions)
    ctx.beginPath();
    ctx.arc(o.circle.cx*W,o.circle.cy*H,o.circle.r*Math.hypot(W,H),0,Math.PI*2);
    ctx.clip();
  }
  if(!img?.naturalWidth||!img.naturalHeight){ ctx.restore(); return; }
  ctx.globalAlpha=Math.max(0,Math.min(1,o.alpha==null?1:o.alpha));
  ctx.filter=(o.blur&&o.blur>0.1)?`blur(${o.blur}px)`:'none';
  const iw=img.naturalWidth;
  const ih=img.naturalHeight;
  const sc=Math.max(W/iw,H/ih)*(o.scale||1);
  const dw=iw*sc;
  const dh=ih*sc;
  const dx=(W-dw)/2+(o.tx||0)*W;
  const dy=(H-dh)/2+(o.ty||0)*H;
  if(o.pixel&&o.pixel>1){
    // pixelate by downscaling to a small temp canvas then upscaling
    const pw=Math.max(1,Math.round(W/o.pixel));
    const ph=Math.max(1,Math.round(H/o.pixel));
    const tmp=_tmpCanvas(pw,ph); const tctx=tmp.getContext('2d');
    tctx.clearRect(0,0,pw,ph);
    const tsc=Math.max(pw/iw,ph/ih);
    const tdw=iw*tsc;
    const tdh=ih*tsc;
    tctx.drawImage(img,(pw-tdw)/2,(ph-tdh)/2,tdw,tdh);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(tmp,0,0,pw,ph,(W-dw)/2,(H-dh)/2,dw,dh);
    ctx.imageSmoothingEnabled=true;
  } else {
    ctx.drawImage(img,dx,dy,dw,dh);
  }
  ctx.restore();
}
let _tc=null;
function _tmpCanvas(w,h){ if(!_tc) _tc=document.createElement('canvas'); _tc.width=w; _tc.height=h; return _tc; }

// Each variant has draw(ctx,W,H,from,to,e). from=outgoing, to=incoming. e is eased.
const VARIANTS={
  fade:{name:'Plain crossfade',
    desc:'Baseline: top image just <b>fades out</b>. No blur.',
    draw(c,W,H,A,B,e){ drawImg(c,B,W,H,{alpha:1}); drawImg(c,A,W,H,{alpha:1-e}); }},
  crossblur:{name:'Cross-blur dissolve',
    desc:'Visible image <b>blurs out and fades</b>; next image is revealed underneath and <b>sharpens from blur into focus</b>.',
    draw(c,W,H,A,B,e){ drawImg(c,B,W,H,{alpha:1,blur:18*(1-e)}); drawImg(c,A,W,H,{alpha:1-e,blur:18*e}); }},
  zoomblur:{name:'Cross-blur subtle zoom',
    desc:'Cross-blur plus a gentle <b>scale push</b> for depth.',
    draw(c,W,H,A,B,e){ drawImg(c,B,W,H,{alpha:1,blur:18*(1-e),scale:1+0.06*(1-e)}); drawImg(c,A,W,H,{alpha:1-e,blur:18*e,scale:1+0.06*e}); }},
  push:{name:'Push (slide)', ease:easeIn,
    desc:'New image <b>pushes the old one out</b> to the left — both slide together. Classic deck-style transition.',
    draw(c,W,H,A,B,e){ drawImg(c,A,W,H,{tx:-e}); drawImg(c,B,W,H,{tx:1-e}); }},
  slide:{name:'Slide cover', ease:easeOut,
    desc:'New image <b>slides in over the old one</b>, which stays put underneath. Subtler than Push.',
    draw(c,W,H,A,B,e){ drawImg(c,A,W,H,{}); drawImg(c,B,W,H,{tx:1-e}); }},
  wipe:{name:'Wipe', ease:easeIn,
    desc:'A <b>vertical edge</b> sweeps left→right, revealing the next image. Hand stays put underneath.',
    draw(c,W,H,A,B,e){ drawImg(c,A,W,H,{}); drawImg(c,B,W,H,{clip:[0,e]}); }},
  whip:{name:'Whip pan',
    desc:'Fast <b>motion-blur swipe</b>: old image streaks off, new one streaks in. Popular for social edits.',
    draw(c,W,H,A,B,e){ const blur=26*Math.sin(e*Math.PI); drawImg(c,B,W,H,{alpha:e,blur:blur,tx:0.7*(1-e)}); drawImg(c,A,W,H,{alpha:1-e,blur:blur,tx:-0.7*e}); }},
  iris:{name:'Iris',
    desc:'Next image opens through an <b>expanding circle</b> from the center.',
    draw(c,W,H,A,B,e){ drawImg(c,A,W,H,{}); drawImg(c,B,W,H,{circle:{cx:.5,cy:.5,r:0.75*e}}); }},
  luma:{name:'Luma dissolve',
    desc:'Dissolve driven by <b>brightness</b> — bright areas give way first. Filmic, organic feel.',
    draw(c,W,H,A,B,e){ lumaDissolve(c,W,H,A,B,e); }},
  zoompunch:{name:'Zoom punch',
    desc:'Quick <b>scale-in punch</b>: outgoing image rushes toward you as the new one settles back.',
    draw(c,W,H,A,B,e){ const blur=10*Math.sin(e*Math.PI); drawImg(c,B,W,H,{alpha:e,scale:1.25-0.25*e,blur:blur}); drawImg(c,A,W,H,{alpha:1-e,scale:1+0.35*e,blur:blur}); }}
};
let current='crossblur';

// luma dissolve via per-pixel threshold on outgoing brightness
let _lumaCanvas=null;
function lumaDissolve(c,W,H,A,B,e){
  drawImg(c,B,W,H,{}); // incoming as base
  if(!A?.naturalWidth||!A.naturalHeight) return;
  // draw A into temp, then erase pixels whose brightness < threshold(e)
  if(!_lumaCanvas) _lumaCanvas=document.createElement('canvas');
  const lc=_lumaCanvas; lc.width=W; lc.height=H;
  const lctx=lc.getContext('2d');
  lctx.clearRect(0,0,W,H);
  const iw=A.naturalWidth;
  const ih=A.naturalHeight;
  const sc=Math.max(W/iw,H/ih);
  const dw=iw*sc;
  const dh=ih*sc;
  lctx.drawImage(A,(W-dw)/2,(H-dh)/2,dw,dh);
  const id=lctx.getImageData(0,0,W,H);
  const d=id.data;
  const thresh=e*255*1.1; // brighter pixels disappear first as e grows
  const soft=28;
  for(let i=0;i<d.length;i+=4){
    const lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    // alpha fades from 1->0 around threshold with a soft edge
    let a=(lum-(thresh-soft))/soft; // 0 below, 1 above
    a=1-Math.max(0,Math.min(1,a));   // invert: bright(below thresh? ) ...
    d[i+3]=Math.round(d[i+3]*a);
  }
  lctx.putImageData(id,0,0);
  c.drawImage(lc,0,0);
}

// glitch/pixelate/flash removed


// global progress g in [0,1] across all segments.
// segments() = number of transition segments. When looping, we add one
// extra wrap-around segment (last image -> first image) using the same effect.
function segments(wrap){ return Math.max(1, images.length-1) + (wrap?1:0); }

// ---- image cache (so preview can draw without async each frame) ----
const _imgCache=new Map();
function getImg(src){
  let im=_imgCache.get(src);
  if(im) return im;
  im=new Image(); im.src=src; _imgCache.set(src,im);
  im.onload=()=>{ if(!playing) render(seek.value/1000,false); }; // redraw once loaded
  return im;
}

const stageCanvas=document.getElementById('stageCanvas');
const sctx=stageCanvas.getContext('2d');
function sizeStageCanvas(){
  const r=stageCanvas.getBoundingClientRect();
  const dpr=Math.min(2,window.devicePixelRatio||1);
  stageCanvas.width=Math.round(r.width*dpr);
  stageCanvas.height=Math.round(r.height*dpr);
}
window.addEventListener('resize',()=>{ sizeStageCanvas(); if(!playing) render(seek.value/1000,false); });

function render(g, wrap){
  const segN=segments(wrap);
  const scaled=g*segN;
  const i=Math.min(Math.floor(scaled), segN-1);
  const local=scaled-i;
  const fromIdx=i;
  const toIdx=(i+1)%images.length;
  const A=getImg(images[fromIdx]);
  const B=getImg(images[toIdx]);
  const ev=(VARIANTS[current].ease||ease)(local);
  if(!stageCanvas.width) sizeStageCanvas();
  const W=stageCanvas.width;
  const H=stageCanvas.height;
  sctx.clearRect(0,0,W,H);
  if(A.complete && B.complete && A.naturalWidth && B.naturalWidth){
    const fr=contentRect(getImg(images[0]),W,H); // first image sets the frame
    sctx.save();
    sctx.beginPath(); sctx.rect(fr.x,fr.y,fr.w,fr.h); sctx.clip();
    sctx.translate(fr.x,fr.y);
    VARIANTS[current].draw(sctx,fr.w,fr.h,A,B,ev);
    sctx.restore();
  }
  pct.textContent=`${Math.round(g*100)}%`;
  fromLbl.textContent=`Step ${fromIdx+1}`;
  toLbl.textContent=`Step ${toIdx+1}`;
}

let _lastDur=durEl.value;
durEl.addEventListener('input',()=>{
  durVal.textContent=`${(durEl.value/1000).toFixed(1)}s`;
  if(durEl.value!==_lastDur){ _lastDur=durEl.value; haptic(); }
});

seek.addEventListener('input',()=>{ if(playing) return; render(seek.value/1000, false); });
resetBtn.addEventListener('click',()=>{ if(playing) return; seek.value=0; render(0, false); });

let rafId=null;
function play(){
  if(playing) return;
  if(images.length<2) return;
  playing=true; playBtn.textContent='⏸\uFE0E Pause';
  const wrap=loopChk.checked; // wrap segment animates last image -> first image
  const totalDur=(+durEl.value)*segments(wrap);
  let start=performance.now();
  let g0=seek.value/1000>=1?0:seek.value/1000;
  function frame(now){
    let g=g0+(now-start)/totalDur;
    if(g>=1) g=1;
    seek.value=Math.round(g*1000);
    render(g, wrap);
    if(g<1){ rafId=requestAnimationFrame(frame); }
    else if(loopChk.checked){
      // seamless restart from 0 using the same effect — no pause, no hard jump
      g0=0; start=performance.now();
      seek.value=0; render(0, wrap);
      rafId=requestAnimationFrame(frame);
    } else {
      playing=false; playBtn.textContent='▶ Play';
    }
  }
  rafId=requestAnimationFrame(frame);
}
function pause(){
  if(!playing) return;
  if(rafId) cancelAnimationFrame(rafId);
  rafId=null;
  playing=false;
  // leave scrubber where it stopped so user can resume or scrub from here
  playBtn.textContent='▶ Play';
}
playBtn.addEventListener('click',()=>{ playing?pause():play(); });

// ---- thumbnail strip ----
let activeThumb=0;
function buildStrip(){
  strip.innerHTML='';
  images.forEach((src,i)=>{
    const t=document.createElement('div');
    t.className=`thumb${i===activeThumb?' active':''}`;
    t.innerHTML=`<img src="${src}"><span class="idx">${i+1}</span>`+
      (images.length>2?`<span class="del" data-del="${i}">×</span>`:'');
    t.onclick=(ev)=>{
      if(ev.target.dataset.del!==undefined){
        ev.stopPropagation();
        images.splice(+ev.target.dataset.del,1);
        if(activeThumb>=images.length) activeThumb=images.length-1;
        buildStrip(); seek.value=0; render(0);
        return;
      }
      activeThumb=i;
      pickerTarget=i;
      filePicker.value='';
      filePicker.click();
      buildStrip();
    };
    strip.appendChild(t);
  });
  if(images.length<5){
    const add=document.createElement('button');
    add.className='addbtn'; add.textContent='+'; add.title='Add image';
    add.onclick=()=>{ pickerTarget='add'; filePicker.value=''; filePicker.click(); };
    strip.appendChild(add);
  }
}

filePicker.addEventListener('change',e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    if(pickerTarget==='add'){ if(images.length>=5) return; images.push(r.result); activeThumb=images.length-1; }
    else { images[pickerTarget]=r.result; }
    buildStrip();
    seek.value=0; render(0);
  };
  r.readAsDataURL(f);
});

const vardescEl=document.getElementById('vardesc');
function updateDesc(){ vardescEl.innerHTML=VARIANTS[current].desc; }

// Build a copyable implementation prompt for the current transition.
const copyBtn=document.getElementById('copyBtn');
const copyLbl=document.getElementById('copyLbl');
function plainDesc(html){ return html.replace(/<\/?b>/g,''); }
function buildPrompt(){
  const v=VARIANTS[current];
  const easing = v.ease===easeIn ? 'ease-in (t*t)' : v.ease===easeOut ? 'ease-out (1-(1-t)^2)' : 'ease-in-out (default)';
  const drawSrc=v.draw.toString();
  return [
`Implement an image-to-image transition called "${v.name}".`,
"",
`Effect: ${plainDesc(v.desc)}`,
"",
"Progress: a single value e in [0,1] drives the whole transition (0 = first image fully shown, 1 = second image fully shown). It should be scrubbable and also playable over a fixed duration.",
`Easing applied to progress: ${easing}.`,
"",
"Rendering model: draw onto a 2D canvas of size W×H. Two images, A (outgoing) and B (incoming), are drawn with object-fit:cover. A reference draw(ctx,W,H,A,B,e) using a drawImg(ctx,img,W,H,opts) helper — where opts supports {alpha, blur(px), scale, tx/ty (fractions of W/H), clip:[l,r] (fractions of width), circle:{cx,cy,r} (fractions)} — looks like:",
"",
drawSrc,
"",
"Reproduce this behavior in the target framework (CSS transforms/filters or canvas, whichever fits). Keep it smooth and reversible across the full e range."
  ].join('\n');
}
function setCopyLabelFade(text){
  copyLbl.classList.add('fading');
  setTimeout(()=>{ copyLbl.textContent=text; copyLbl.classList.remove('fading'); },160);
}
copyBtn.addEventListener('click', async ()=>{
  const text=buildPrompt();
  try{
    await navigator.clipboard.writeText(text);
  }catch(e){
    // fallback
    const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0;'; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(_){}
    ta.remove();
  }
  copyLbl.textContent='✓ Copied';        // instant, no transition
  setTimeout(()=>setCopyLabelFade('Copy prompt'),1500); // fade back
});
function buildVariants(){
  variantsEl.innerHTML='';
  const keys=Object.keys(VARIANTS).sort((a,b)=>VARIANTS[a].name.localeCompare(VARIANTS[b].name));
  for(const k of keys){
    const v=VARIANTS[k];
    const b=document.createElement('button');
    b.className=`variant${k===current?' active':''}`;
    b.textContent=v.name;
    b.onclick=()=>{ if(playing) return; current=k; buildVariants(); updateDesc(); render(seek.value/1000); };
    variantsEl.appendChild(b);
  }
}

buildStrip();
buildVariants();
updateDesc();
sizeStageCanvas();
render(0);
// re-size once layout/fonts settle (aspect-ratio box may compute after first paint)
requestAnimationFrame(()=>{ sizeStageCanvas(); render(0); });
setTimeout(()=>{ sizeStageCanvas(); render(seek.value/1000,false); },200);

/* ---------- Download transition as video ---------- */
const dlBtn=document.getElementById('dlBtn');
const dlLbl=document.getElementById('dlLbl');

// state change: crossfade the label text (pill has fixed width, no width animation)
function setPillState(text){
  dlLbl.classList.add('fading');
  setTimeout(()=>{
    dlLbl.textContent=text;
    dlLbl.classList.remove('fading');
  },160);
}
// fast progress update: no fade
function setPillProgress(text){
  dlLbl.textContent=text;
}

function loadImg(src){
  return new Promise((res,rej)=>{
    const im=new Image();
    im.onload=()=>res(im);
    im.onerror=rej;
    im.src=src;
  });
}

async function downloadVideo(){
  if(playing || images.length<2) return;
  dlBtn.disabled=true; const orig='Download';
  setPillState('Rendering   0%');
  try{
    // load all images, find largest resolution
    const imgs=await Promise.all(images.map(loadImg));
    // first image defines the output frame; later images cover-crop into it
    let W=imgs[0].naturalWidth;
    let H=imgs[0].naturalHeight;
    // keep even dimensions for encoders
    W-=W%2; H-=H%2;

    const cvs=document.createElement('canvas');
    cvs.width=W; cvs.height=H;
    const ctx=cvs.getContext('2d');

    const fps=30;
    const wrap=loopChk.checked;
    const segN=segments(wrap);
    const totalMs=(+durEl.value)*segN;
    const _totalFrames=Math.max(2,Math.round(totalMs/1000*fps));

    // pick a supported mime; prefer mp4 if the browser can encode it, else webm
    const candidates=[
      'video/mp4;codecs=avc1.42E01E',
      'video/mp4',
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8',
      'video/webm'
    ];
    const mime=candidates.find(c=>window.MediaRecorder && MediaRecorder.isTypeSupported(c)) || '';
    const ext = mime.startsWith('video/mp4') ? 'mp4' : 'webm';

    const stream=cvs.captureStream(fps);
    const chunks=[];
    const rec=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
    rec.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
    const done=new Promise(r=>{ rec.onstop=r; });
    rec.start();

    // render frames paced to real time so MediaRecorder samples them
    const paramsAt=(g)=>{
      const scaled=g*segN;
      const i=Math.min(Math.floor(scaled), segN-1);
      const local=scaled-i;
      const fromIdx=i;
      const toIdx=(i+1)%imgs.length;
      return {from:imgs[fromIdx], to:imgs[toIdx], e:(VARIANTS[current].ease||ease)(local)};
    };

    const startT=performance.now();
    await new Promise(resolve=>{
      function tick(now){
        let g=(now-startT)/totalMs;
        if(g>1) g=1;
        const fr=paramsAt(g);
        ctx.clearRect(0,0,W,H);
        if(fr.from&&fr.to&&fr.from.naturalWidth&&fr.to.naturalWidth){
          VARIANTS[current].draw(ctx,W,H,fr.from,fr.to,fr.e);
        }
        setPillProgress(`Rendering ${String(Math.round(g*100)).padStart(3,'\u2007')}%`);
        if(g<1){ requestAnimationFrame(tick); }
        else { resolve(); }
      }
      requestAnimationFrame(tick);
    });

    // give recorder a beat to capture the final frame, then stop
    await new Promise(r=>setTimeout(r,120));
    rec.stop();
    await done;

    const blob=new Blob(chunks,{type:mime||'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`scrubly-transition.${ext}`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);

    setPillState('Done ✓');
    setTimeout(()=>{ setPillState(orig); },1500);
  }catch(err){
    console.error(err);
    setPillState('Failed');
    setTimeout(()=>{ setPillState('Download'); },1500);
  }finally{
    dlBtn.disabled=false;
    // restore preview to its current scrub position
    render(seek.value/1000, false);
  }
}
dlBtn.addEventListener('click',downloadVideo);
</script>
